name: Daily Report

on:
  schedule:
    # Hora UTC — Meta necesita ~7h tras medianoche para finalizar spend.
    #   '0 7 * * *'  = 7:00 UTC = 9:00 CEST (Madrid verano) / 8:00 CET (invierno)
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Override report date (YYYY-MM-DD). Leave empty for yesterday.'
        required: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Run daily report
        env:
          # --- Requeridas (configurar en Settings > Secrets) ---
          STORE_NAME: ${{ secrets.STORE_NAME }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID: ${{ secrets.META_AD_ACCOUNT_ID }}
          SHOPIFY_STORE_DOMAIN: ${{ secrets.SHOPIFY_STORE_DOMAIN }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          SHOPIFY_CLIENT_ID: ${{ secrets.SHOPIFY_CLIENT_ID }}
          SHOPIFY_CLIENT_SECRET: ${{ secrets.SHOPIFY_CLIENT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

          # --- Opcionales ---
          STORE_CURRENCY: '€'
          STORE_LOCALE: 'es-MX'
          REPORT_TIME_LABEL: '9:00 AM'
          # STORE_INDUSTRY: ''
          # ROAS_BENCHMARK: ''
          # META_API_VERSION: 'v21.0'
          # SHOPIFY_API_VERSION: '2024-10'
          # CLAUDE_MODEL: 'claude-sonnet-4-6'
          # SUBSCRIPTION_TAGS: '[{"tag":"Kaching Subscription First Order","label":"1ª Susc"},{"tag":"appstle_subscription_recurring_order","label":"Recurrentes"}]'
          REPORT_DATE: ${{ github.event.inputs.date }}
        run: node src/report.js
